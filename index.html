<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الحماية المشتركة</title>
    <style>
        body { background: #0a0a0a; color: white; text-align: center; font-family: sans-serif; overflow-x: hidden; }
        .nav { background: #000; padding: 15px; }
        a button, .nav button { background: #d4af37; border: none; padding: 10px 20px; margin: 5px; font-weight: bold; cursor: pointer; }
        table { margin: 20px auto; width: 80%; border-collapse: collapse; }
        th, td { border: 1px solid #d4af37; padding: 10px; }
        .del { background: red; color: white; border: none; padding: 5px; cursor: pointer; }
        input { padding: 8px; background: #222; color: white; border: 1px solid #d4af37; margin: 5px; text-align: center; }
        .case-number { background: #d4af37; color: black; padding: 2px 8px; font-weight: bold; border-radius: 3px; }
        #loginBox { background: #111; width: 320px; margin: 80px auto; padding: 25px; border: 2px solid #d4af37; border-radius: 5px; }
        #mainContent { display: none; }
        #welcomeBadge { background: #111; border: 1px solid #d4af37; padding: 10px; display: inline-block; margin-top: 10px; border-radius: 5px; font-weight: bold; }
        #fingerprintArea { display: none; margin-top: 20px; }
        .fingerprint-pad { width: 100px; height: 100px; margin: 15px auto; background: #222 url('https://img.icons8.com/ios-filled/100/d4af37/fingerprint.png') no-repeat center; background-size: 65%; border: 3px dashed #d4af37; border-radius: 50%; cursor: pointer; position: relative; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: #00ffcc; top: -10px; display: none; }
        @keyframes laserMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
    </style>
</head>
<body>

    <div id="loginBox">
        <h3 id="portalTitle">🔐 بوابة الحماية الثنائية</h3>
        <div id="authInputs">
            <input id="user" type="text" placeholder="اسم المستخدم"><br>
            <input id="pass" type="password" placeholder="الرقم السري"><br>
            <button onclick="verifyPassword()" style="background:#d4af37; padding:10px; font-weight:bold; width:100%; cursor:pointer;">التحقق من الهوية</button>
        </div>
        <div id="fingerprintArea">
            <p style="font-size: 12px; color: #aaa;">اضغط على المستشعر لإكمال الدخول</p>
            <div class="fingerprint-pad" id="scanner" onmousedown="startScan()" onmouseup="cancelScan()" onmouseleave="cancelScan()" ontouchstart="startScan()" ontouchend="cancelScan()">
                <div class="scan-line" id="laser"></div>
            </div>
            <div id="status">في انتظار تبصيم المحقق...</div>
        </div>
    </div>

    <div id="mainContent">
        <div class="nav">
            <a href="index.html"><button>الرئيسية</button></a>
            <button onclick="logout()" style="background:#7f1d1d; color:white;">خروج</button>
        </div>
        <div id="welcomeBadge">مرحباً حضرة المحقق: <span id="welcomeName"></span></div>
        <br>
        <input id="cID" type="number" placeholder="رقم القضية">
        <input id="cType" placeholder="نوع الجريمة">
        <button onclick="addCase()">إنشاء قضية</button>
        <table id="cTable">
            <thead><tr><th>رقم القضية</th><th>النوع</th><th>إجراء</th></tr></thead>
            <tbody id="cBody"></tbody>
        </table>
    </div>

    <script>
        const DB_KEY = 'fbiUsersList_V3'; // المفتاح الموحد

        // 1. تعريف المستخدمين (يتم تشغيله مرة واحدة)
        if (!localStorage.getItem(DB_KEY)) {
            const defaultUsers = [
                { username: "sherlock", pass: "221b", rank: "Detective commander" },
                { username: "ahmed", pass: "fbi2026", rank: "detective member" },
                { username: "اسم_خويك", pass: "1234", rank: "debuty detective commander" }
            ];
            localStorage.setItem(DB_KEY, JSON.stringify(defaultUsers));
        }

        function verifyPassword() {
            let u = document.getElementById('user').value.trim().toLowerCase();
            let p = document.getElementById('pass').value.trim();
            let savedUsers = JSON.parse(localStorage.getItem(DB_KEY));
            
            let account = savedUsers.find(user => user.username.toLowerCase() === u && user.pass === p);

            if (account) {
                window.verifiedUser = account.username;
                document.getElementById('authInputs').style.display = 'none';
                document.getElementById('fingerprintArea').style.display = 'block';
            } else { alert("❌ بيانات الدخول غير صحيحة"); }
        }

        function startScan() {
            document.getElementById('laser').style.display = 'block';
            document.getElementById('laser').style.animation = 'laserMove 1s linear infinite';
            window.scanTimer = setTimeout(() => {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', window.verifiedUser);
                showSite();
            }, 2000);
        }

        function cancelScan() {
            clearTimeout(window.scanTimer);
            document.getElementById('laser').style.display = 'none';
        }

        function showSite() {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            document.getElementById('welcomeName').innerText = localStorage.getItem('username');
            loadCases();
        }

        function logout() { localStorage.clear(); location.reload(); }

        function addCase() {
            let cases = JSON.parse(localStorage.getItem('casesList') || "[]");
            cases.push({ id: document.getElementById('cID').value, type: document.getElementById('cType').value });
            localStorage.setItem('casesList', JSON.stringify(cases));
            loadCases();
        }

        function loadCases() {
            let cases = JSON.parse(localStorage.getItem('casesList') || "[]");
            let tbody = document.getElementById('cBody'); tbody.innerHTML = "";
            cases.forEach((c, i) => {
                tbody.innerHTML += `<tr><td>#${c.id}</td><td>${c.type}</td><td><button onclick="deleteCase(${i})">X</button></td></tr>`;
            });
        }
        
        function deleteCase(i) {
            let cases = JSON.parse(localStorage.getItem('casesList'));
            cases.splice(i, 1); localStorage.setItem('casesList', JSON.stringify(cases)); loadCases();
        }

        if (localStorage.getItem('isLoggedIn') === 'true') showSite();
    </script>
</body>
</html>
